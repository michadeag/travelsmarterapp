        // Load checklist on page load
        document.addEventListener('DOMContentLoaded', loadChecklist);

        async function loadChecklist() {
            try {
                // Check user tier
                const token = localStorage.getItem('userToken');
                if (!token) {
                    showUpgradePrompt();
                    return;
                }

                const response = await fetch('https://api.travelsmarterapp.com/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                const userTier = (data.user?.subscriptionTier || 'free').toLowerCase();

                // Check if user has access (Smart Traveler or Elite)
                if (userTier !== 'smart traveler' && userTier !== 'smarttraveler' && userTier !== 'elite') {
                    showUpgradePrompt();
                    return;
                }

                // Load checklist
                displayChecklist();
            } catch (error) {
                console.error('Error checking tier:', error);
                showUpgradePrompt();
            }
        }

        function displayChecklist() {
            const checklist = CHECKLISTS[moduleId];
            if (!checklist) {
                document.getElementById('moduleName').textContent = 'Module Not Found';
                return;
            }

            // Update header
            document.getElementById('moduleName').textContent = checklist.title;
            document.getElementById('moduleDescription').textContent = checklist.description;

            // Build checklist HTML
            const contentDiv = document.getElementById('checklist-content');
            let totalItems = 0;
            let html = '';

            for (const section of checklist.sections) {
                html += `<div class="checklist-section">
                    <h3>${section.title}</h3>`;

                for (const item of section.items) {
                    const itemId = `item-${totalItems}`;
                    html += `
                        <div class="checklist-item">
                            <input type="checkbox" id="${itemId}" onchange="updateProgress()">
                            <label for="${itemId}">${item}</label>
                        </div>`;
                    totalItems++;
                }

                html += '</div>';
            }

            // Add progress bar
            html += `
                <div class="progress-bar">
                    <div class="progress-label">
                        <span>Progress:</span>
                        <strong><span id="progress-text">0%</span></strong>
                    </div>
                    <div class="progress-fill">
                        <div class="progress-bar-inner" id="progress-bar"></div>
                    </div>
                </div>`;

            contentDiv.innerHTML = html;

            // Store total items for progress calculation
            window.totalItems = totalItems;
            updateProgress();
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const percentage = Math.round((checked / window.totalItems) * 100);

            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = percentage + '%';

            // Save progress to localStorage
            localStorage.setItem(`checklist-${moduleId}`, JSON.stringify(
                Array.from(checkboxes).map(cb => cb.checked)
            ));
        }

        function showUpgradePrompt() {
            document.getElementById('checklist-content').style.display = 'none';
            document.getElementById('upgrade-section').style.display = 'block';
        }

        function downloadPDF() {
            alert('📥 Download feature coming soon! For now, use the Print button to save as PDF.');
        }

        function goBack() {
            window.history.back();
        }

        // Load saved progress on page load
        window.addEventListener('load', () => {
            const saved = localStorage.getItem(`checklist-${moduleId}`);
            if (saved) {
                const states = JSON.parse(saved);
                const checkboxes = document.querySelectorAll('input[type="checkbox"]');
                checkboxes.forEach((cb, i) => {
                    if (states[i]) cb.checked = true;
                });
            }
        });
    </script>
</body>
</html>
