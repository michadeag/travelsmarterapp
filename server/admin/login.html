<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TravelSmarter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1f2937;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            text-align: center;
            font-size: 3em;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #9ca3af;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
        }

        .remember-me label {
            margin: 0;
            font-weight: 500;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            color: #9ca3af;
            margin: 20px 0;
            font-size: 0.9em;
        }

        .demo-info {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #bfdbfe;
            margin-top: 20px;
        }

        .demo-info h4 {
            color: #0c2d6b;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .demo-info p {
            color: #1e3a8a;
            font-size: 0.9em;
            margin: 5px 0;
        }

        .demo-info code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .spinner {
            border: 2px solid #f0f0f0;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .settings-link {
            text-align: center;
            margin-top: 20px;
        }

        .settings-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 600;
        }

        .settings-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🛂</div>
        <h1>Admin Portal</h1>
        <p class="subtitle">TravelSmarter Management Dashboard</p>

        <div id="alert" class="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@travelsmarter.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember" checked>
                <label for="remember">Remember me</label>
            </div>

            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>

        <div class="divider">Demo Credentials</div>

        <div class="demo-info">
            <h4>Test Admin Account</h4>
            <p>Email: <code>admin@travelsmarter.com</code></p>
            <p>Password: <code>DemoPassword123!</code></p>
            <p style="margin-top: 10px; font-size: 0.85em; color: #666;">
                Note: In production, use strong passwords and enable 2FA
            </p>
        </div>

        <div class="settings-link">
            <a href="#" onclick="openSettings()">API Settings</a>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    ">
        <div style="
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        ">
            <h3 style="margin-bottom: 20px;">API Settings</h3>

            <div class="form-group">
                <label for="api-url">API URL</label>
                <input type="url" id="api-url" placeholder="http://localhost:5000" value="http://localhost:5000">
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="login-btn" style="margin: 0; flex: 1;" onclick="saveSettings()">Save</button>
                <button class="login-btn" style="
                    margin: 0;
                    flex: 1;
                    background: #6b7280;
                " onclick="closeSettings()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = localStorage.getItem('apiUrl') || 'http://localhost:5000';

        // Set API URL on page load
        document.getElementById('api-url').value = API_URL;

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('login-btn');

            // Show loading state
            btn.innerHTML = '<span class="spinner"></span>Signing in...';
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // For demo purposes, accept the demo credentials
                // In production, this would call the backend API
                if (email === 'admin@travelsmarter.com' && password === 'DemoPassword123!') {
                    // Simulate API call delay
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    // Store credentials
                    const token = 'demo_token_' + Date.now();
                    localStorage.setItem('adminToken', token);
                    localStorage.setItem('adminName', 'Admin');
                    localStorage.setItem('apiUrl', API_URL);

                    if (remember) {
                        localStorage.setItem('rememberMe', 'true');
                    }

                    showAlert('Login successful! Redirecting...', 'success');

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showAlert('Invalid email or password', 'error');
                }
            } catch (error) {
                showAlert('Login failed. Please try again.', 'error');
            } finally {
                btn.innerHTML = 'Sign In';
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;

            if (type === 'error') {
                setTimeout(() => {
                    alertEl.classList.remove('show');
                }, 4000);
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function saveSettings() {
            const apiUrl = document.getElementById('api-url').value;
            if (!apiUrl) {
                alert('Please enter API URL');
                return;
            }
            localStorage.setItem('apiUrl', apiUrl);
            showAlert('Settings saved', 'success');
            closeSettings();
        }

        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'dashboard.html';
        }

        // Focus email input on load
        document.getElementById('email').focus();
    </script>
</body>
</html>
