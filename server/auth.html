<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - TravelSmarter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1f2937;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .auth-header p {
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
        }

        .auth-toggle a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            color: #9ca3af;
            margin: 20px 0;
        }

        .extra-fields {
            display: none;
        }

        .extra-fields.show {
            display: block;
        }

        .spinner {
            border: 2px solid #f0f0f0;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .settings-link {
            text-align: center;
            margin-top: 15px;
        }

        .settings-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.85em;
        }

        .settings-link a:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>✈️ TravelSmarter</h1>
            <p id="auth-subtitle">Sign in to your account</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <!-- Additional fields for signup -->
            <div id="extra-fields" class="extra-fields">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="John">
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe">
                </div>
            </div>

            <button type="submit" class="auth-btn" id="auth-btn">Sign In</button>
        </form>

        <div class="divider">or</div>

        <div class="auth-toggle">
            <span id="auth-toggle-text">Don't have an account? </span>
            <a onclick="toggleAuthMode()">Sign Up</a>
        </div>

        <div class="settings-link">
            <a href="#" onclick="openSettings()">Change API URL</a>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    ">
        <div style="
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        ">
            <h3 style="margin-bottom: 20px;">API Configuration</h3>

            <div style="margin-bottom: 20px;">
                <label for="api-url" style="display: block; margin-bottom: 8px; font-weight: 600;">API URL</label>
                <input type="url" id="api-url" placeholder="http://localhost:5000/api"
                       style="width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button onclick="saveAPISettings()" style="
                    flex: 1;
                    padding: 10px;
                    background: #667eea;
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-weight: 600;
                    cursor: pointer;
                ">Save</button>
                <button onclick="closeSettings()" style="
                    flex: 1;
                    padding: 10px;
                    background: #e5e7eb;
                    color: #1f2937;
                    border: none;
                    border-radius: 8px;
                    font-weight: 600;
                    cursor: pointer;
                ">Cancel</button>
            </div>
        </div>
    </div>

    <script src="api-service.js"></script>
    <script>
        let isSignUp = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Set API URL from input
            const storedUrl = localStorage.getItem('apiUrl');
            if (storedUrl) {
                api.setBaseURL(storedUrl);
            }

            // Check if already logged in
            if (api.isLoggedIn()) {
                window.location.href = 'account.html';
            }
        });

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('auth-btn');
            const toggleText = document.getElementById('auth-toggle-text');
            const extraFields = document.getElementById('extra-fields');
            const toggleLink = document.querySelector('.auth-toggle a');

            if (isSignUp) {
                subtitle.textContent = 'Create your account';
                btn.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account? ';
                toggleLink.textContent = 'Sign In';
                extraFields.classList.add('show');

                document.getElementById('firstName').required = true;
                document.getElementById('lastName').required = true;
            } else {
                subtitle.textContent = 'Sign in to your account';
                btn.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account? ";
                toggleLink.textContent = 'Sign Up';
                extraFields.classList.remove('show');

                document.getElementById('firstName').required = false;
                document.getElementById('lastName').required = false;
            }

            // Clear form
            document.getElementById('auth-form').reset();
            hideAlert();
        }

        async function handleAuth(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('auth-btn');

            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Processing...';

            try {
                let response;

                if (isSignUp) {
                    const firstName = document.getElementById('firstName').value;
                    const lastName = document.getElementById('lastName').value;

                    response = await api.signup(email, password, firstName, lastName);
                } else {
                    response = await api.login(email, password);
                }

                if (response.success) {
                    showAlert('Success! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'account.html';
                    }, 1000);
                } else {
                    showAlert(response.message || 'Authentication failed', 'error');
                }
            } catch (error) {
                showAlert(error.message || 'An error occurred', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
            }
        }

        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            const alertEl = document.getElementById('alert');
            alertEl.classList.remove('show');
        }

        function openSettings() {
            const apiUrl = api.baseURL.replace('/api', '');
            document.getElementById('api-url').value = apiUrl;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function saveAPISettings() {
            const url = document.getElementById('api-url').value;
            if (!url) {
                alert('Please enter API URL');
                return;
            }
            const apiUrl = url.endsWith('/api') ? url : url + '/api';
            api.setBaseURL(apiUrl);
            showAlert('API URL updated', 'success');
            closeSettings();
        }
    </script>
</body>
</html>
